- ros_topic_name: "/right_wheel/cmd_vel"
  gz_topic_name: "/model/compa/joint/right_rocker_right_wheel_joint/cmd_vel"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

# Gimbal
- ros_topic_name: "/roll/cmd_vel"
